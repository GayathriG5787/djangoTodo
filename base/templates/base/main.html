<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To Do Items</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,200..1000;1,200..1000&family=Outfit:wght@100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Rubik:ital,wght@0,300..900;1,300..900&family=Sansation:ital,wght@0,300;0,400;0,700;1,300;1,400;1,700&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #FAFAFA;
            font-family: "Nunito", sans-serif;
            padding-top: 50px;
        }

        h1, h2, h3, h4, h5 {
            font-family: "Raleway", sans-serif;
        }

        a, p {
            color: #4b5156;
        }

        .container {
            max-width: 550px;
            margin: auto;
            background-color: #ffffff;

            /* The values indicate Horizontal Offset, Vertical Offset, blur radius, spread radius and color */
            /* Horizontal Offset = Positive right, Negative left */
            /* Vertical Offset = Positive down Negative up*/
            /* Blur radius = larger value then softer shadow, smaller value then sharper shadow */
            /* Spread Radius = positive then shadow grows, negative then shadow shrinks */
            /* In color, first 3 indicates color and 4th field indicates opacity */

            box-shadow: 2px 2px 13px -4px rgba(0, 0, 0, 0.21);
        }

        .header-bar {
            display: flex;
            justify-content: space-between;
            color: #fff;
            padding: 10px;
            /* Border radius applied in this order - topleft, topright, bottomright, bottomleft */
            border-radius: 5px 5px 0 0;
            /* 0deg - bottom to top */
            /* 90deg - left to right */
            /* 180deg - top to bottom */
            /* 270deg - right to left */
            background: linear-gradient(90deg, #EEA390 0%, #EB796F 43%, #EB796F 100%);
        }

        .header-bar button, a {
            background: none;
            border: none;
            color: white;
            cursor: pointer;
            padding: 0;
            font: inherit;
            text-decoration: none;
        }

        .task-wrapper {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px;
            background-color: #fff;
            border-top: 1px solid rgb(226, 226, 226);
        }

        .task-title {
            display: flex;
        }

        .task-title a {
            text-decoration: none;
            color: #4b5156;
            margin-left: 10px;
        }

        .task-complete-icon {
            height: 20px;
            width: 20px;
            background-color: rgb(105, 192, 105);
            border-radius: 50%;
        }

        .task-incomplete-icon {
            height: 20px;
            width: 20px;
            background-color: rgb(218, 218, 218);
            border-radius: 50%;
        }
        
        .delete-link {
            text-decoration: none;
            font-weight: 900;
            color: #cf4949;
            font-size: 22px;
        }

        #search-add-wrapper {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
        }

        #add-link {
            color: #EB706F;
            text-decoration: none;
            font-size: 42px;
            /* text-shadow: horizontal-offset vertical-offset color; */
            text-shadow: 1px 1px #81413b;
        }

        input[type=text],
        input[type=password],
        textarea {
            border: 1px solid #EB796F;
            border-radius: 5px;
            padding: 10px;
            width: 90%;
        }

        label {
            padding-top: 10px;
            display: block;
        }

        .button {
            border: 1px solid #EB706F;
            background-color: #FAFAFA;
            color: #EB796F;
            padding: 10px;
            font-size: 14px;
            border-radius: 5px;
            cursor: pointer;
        }
        
        .search {
            display: flex;
            gap: 5px;
        }

        .card-body {
            padding: 20px;
        }


    </style>
</head>
<body>
    <div class="container">
        {% block content %}

        {% endblock content %}
    </div>
</body>
</html>
