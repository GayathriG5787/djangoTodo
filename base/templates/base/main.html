<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To Do Items</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,200..1000;1,200..1000&family=Outfit:wght@100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Rubik:ital,wght@0,300..900;1,300..900&family=Sansation:ital,wght@0,300;0,400;0,700;1,300;1,400;1,700&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #FAFAFA;
            font-family: "Nunito", sans-serif;
            padding-top: 50px;
        }

        h1, h2, h3, h4, h5 {
            font-family: "Raleway", sans-serif;
        }

        a, p {
            color: #4b5156;
        }

        .container {
            max-width: 550px;
            margin: auto;
            background-color: #ffffff;

            /* The values indicate Horizontal Offset, Vertical Offset, blur radius, spread radius and color */
            /* Horizontal Offset = Positive right, Negative left */
            /* Vertical Offset = Positive down Negative up*/
            /* Blur radius = larger value then softer shadow, smaller value then sharper shadow */
            /* Spread Radius = positive then shadow grows, negative then shadow shrinks */
            /* In color, first 3 indicates color and 4th field indicates opacity */

            box-shadow: 2px 2px 13px -4px rgba(0, 0, 0, 0.21);
        }

        .header-bar {
            display: flex;
            justify-content: space-between;
            color: #fff;
            padding: 10px;
            /* Border radius applied in this order - topleft, topright, bottomright, bottomleft */
            border-radius: 5px 5px 0 0;
            /* 0deg - bottom to top */
            /* 90deg - left to right */
            /* 180deg - top to bottom */
            /* 270deg - right to left */
            background: linear-gradient(90deg, #EEA390 0%, #EB796F 43%, #EB796F 100%);
        }

        .header-bar button {
            background: none;
            border: none;
            color: white;
            cursor: pointer;
            padding: 0;
            font: inherit;
        }

    </style>
</head>
<body>
    <div class="container">
        {% block content %}

        {% endblock content %}
    </div>
</body>
</html>
