{% extends 'base/main.html' %} {% block content %}

<div class="header-bar">
  <h1>Register</h1>
</div>

<div class="card-body">
  <form method="POST" action="">
    {% csrf_token %} 
    
    <label for="">{{form.username.label}}</label>
    {{form.username}}
    {{form.username.errors}}

    <label for="">{{form.password1.label}}</label>
    {{form.password1}}
    {{form.password1.errors}}

    <label for="">{{form.password2.label}}</label>
    {{form.password2}}
    {{form.password2.errors}}

    <button style="margin-top: 10px;" class="button" type="submit">Register</button>
  </form>

  <p>Already have a account? <a href="{% url 'login' %}">Login</a></p>
</div>

{% endblock content %}
